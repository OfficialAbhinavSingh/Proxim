services:
  client:
    build:
      context: .
      dockerfile: Dockerfile.client
      args:
        VITE_WS_URL: ${VITE_WS_URL:-ws://localhost:3001}
        VITE_API_URL: ${VITE_API_URL:-http://localhost:3001}
        VITE_HTTP_SERVER_URL: ${VITE_HTTP_SERVER_URL:-http://localhost:3001}
    ports:
      - "${CLIENT_PORT:-8080}:80"
    depends_on:
      server:
        condition: service_healthy
    restart: unless-stopped
  server:
    build:
      context: .
      dockerfile: Dockerfile.server
    ports:
      - "${SERVER_PORT:-3001}:3001"
    env_file:
      - ./server/.env
    environment:
      - PORT=3001
      - PERSONAS_PATH=/app/dist/config/personas.json
      - AVATAR_PUBLIC_DIR=/app/public/avatars
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:'+(process.env.PORT||3001)+'/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
